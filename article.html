<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="pageTitle">The Relax</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;900&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    :root {
      --blue:#4064f7;
      --gold:#e19832;
      --dark:#0f0f14;
      --ink:#1a1a2e;
      --paper:#faf9f6;
      --muted:#7a7a8c;
      --line:rgba(64,100,247,0.12);
    }

    html { scroll-behavior:smooth; }

    body {
      font-family:'Cairo',sans-serif;
      background:var(--paper);
      color:var(--ink);
      overflow-x:hidden;
    }

    /* HEADER */
    header {
      position:fixed;
      top:0;
      width:100%;
      height:68px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:0 2rem;
      background:rgba(250,249,246,0.85);
      backdrop-filter:blur(16px);
      border-bottom:1px solid var(--line);
      z-index:100;
    }

    .logo img { width:80px; }

    .back-btn {
      display:flex;
      gap:6px;
      color:var(--muted);
      text-decoration:none;
    }

    #progress {
      position:fixed;
      top:68px;
      width:100%;
      height:3px;
      background:var(--line);
      z-index:99;
    }

    #progress-fill {
      height:100%;
      width:0%;
      background:linear-gradient(90deg,var(--blue),var(--gold));
    }

    /* HERO */
    .hero {
      display:grid;
      grid-template-columns:1fr 1fr;
      min-height:90vh;
      margin-top:68px;
    }

    .hero-text-side {
      padding:4rem 2rem;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }

    .hero-title {
      font-size:2.5rem;
      font-weight:900;
      margin-bottom:1rem;
    }

    .hero-excerpt {
      color:var(--muted);
      margin-bottom:2rem;
    }

    .hero-image-side img {
      width:100%;
      height:100%;
      object-fit:cover;
    }

    /* ARTICLE */
    .article-wrap {
      max-width:760px;
      margin:auto;
      padding:4rem 1.5rem;
    }

    .article-body p {
      line-height:2;
      margin-bottom:1.5rem;
    }

    /* SKELETON */
    .skeleton {
      background:linear-gradient(90deg,#eee,#f5f5f5,#eee);
      background-size:400% 100%;
      animation:shimmer 1.2s infinite;
      border-radius:8px;
    }

    @keyframes shimmer {
      0% {background-position:100% 0;}
      100% {background-position:0 0;}
    }

    .title-skeleton { height:40px; width:80%; }
    .text-skeleton { height:16px; margin-top:10px; }

    .loading { opacity:0.4; }

  </style>
</head>

<body>

<header>
  <div class="logo">
    <a href="index.html"><img src="logo.png"></a>
  </div>

  <a class="back-btn" href="javascript:history.back()">
    العودة
  </a>
</header>

<div id="progress"><div id="progress-fill"></div></div>

<section class="hero">
  <div class="hero-text-side">

    <h1 class="hero-title loading" id="articleTitle">
      <div class="skeleton title-skeleton"></div>
    </h1>

    <p class="hero-excerpt loading" id="articleDescription">
      <div class="skeleton text-skeleton"></div>
      <div class="skeleton text-skeleton"></div>
    </p>

  </div>

  <div class="hero-image-side">
    <img id="articleImage" src="">
  </div>
</section>

<article class="article-wrap">
  <div class="article-body" id="articleContent"></div>
</article>

<script>
const STRAPI_URL = "https://the-relax-cms.onrender.com";

/* LOADING */
function showLoading(){
  document.querySelectorAll(".loading").forEach(e=>{
    e.style.opacity="0.4";
  });
}

function hideLoading(){
  document.querySelectorAll(".loading").forEach(e=>{
    e.style.opacity="1";
  });
}

/* IMAGE */
function getImg(img){
  let url = img?.url || img?.data?.attributes?.url || img;
  if(!url) return "";
  return url.startsWith("http") ? url : STRAPI_URL + url;
}

/* LOAD ARTICLE */
async function loadArticle(){
  try {
    showLoading();

    const slug = new URLSearchParams(window.location.search).get("slug");
    if(!slug) return;

    const res = await fetch(`${STRAPI_URL}/api/articles?filters[slug][$eq]=${slug}&populate=*`);
    const json = await res.json();

    const article = json?.data?.[0];
    if(!article) return;

    const data = article.attributes || article;

    document.getElementById("pageTitle").innerText = data.title + " - The Relax";

    document.getElementById("articleTitle").innerText = data.title || "";
    document.getElementById("articleDescription").innerText = data.short_description || "";

    document.getElementById("articleImage").src = getImg(data.cover_image);

    const contentEl = document.getElementById("articleContent");
    contentEl.innerHTML = window.marked ? marked.parse(data.content || "") : data.content;

    hideLoading();

  } catch(err){
    console.log(err);
  }
}

document.addEventListener("DOMContentLoaded", loadArticle);
</script>

</body>
</html>
