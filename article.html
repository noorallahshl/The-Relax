<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Relax Article</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">

<style>
@font-face {
  font-family: "SST Arabic";
  src: url("SST-Arabic.woff2") format("woff2");
}

:root{
  --blue:#4064f7;
  --gold:#e19832;
  --ink:#1a1a2e;
  --muted:#6f6f86;
  --paper:#f7f7fb;
  --line:rgba(64,100,247,0.15);
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:"SST Arabic","Cairo",sans-serif;
  background:var(--paper);
  color:var(--ink);
  direction:rtl;
}

/* ===== HEADER ===== */
header{
  position:fixed;
  top:0;
  width:100%;
  height:70px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 2rem;
  background:rgba(255,255,255,0.75);
  backdrop-filter:blur(18px);
  border-bottom:1px solid var(--line);
  z-index:100;
}

.logo img{width:85px;}

.back-btn{
  color:var(--muted);
  text-decoration:none;
  font-weight:600;
}

/* ===== PROGRESS ===== */
#progress{
  position:fixed;
  top:70px;
  width:100%;
  height:3px;
  background:var(--line);
}
#progress-fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,var(--blue),var(--gold));
}

/* ===== HERO ===== */
.hero{
  display:grid;
  grid-template-columns:1.2fr 1fr;
  min-height:95vh;
  margin-top:70px;
}

.hero-left{
  padding:5rem 3rem;
  display:flex;
  flex-direction:column;
  justify-content:center;
  position:relative;
}

/* decorative line */
.hero-left::before{
  content:"";
  position:absolute;
  right:20px;
  top:20%;
  width:2px;
  height:60%;
  background:linear-gradient(var(--blue),transparent);
  opacity:0.3;
}

.badge{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:6px 14px;
  border-radius:50px;
  background:rgba(64,100,247,0.08);
  color:var(--blue);
  font-weight:700;
  font-size:0.8rem;
  width:fit-content;
  margin-bottom:1.5rem;
}

.badge-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--gold);
}

.hero-title{
  font-size:3rem;
  font-weight:900;
  line-height:1.4;
  margin-bottom:1rem;
}

.hero-title em{
  color:var(--blue);
  font-style:normal;
  position:relative;
}

.hero-title em::after{
  content:"";
  position:absolute;
  bottom:5px;
  right:0;
  width:100%;
  height:10px;
  background:rgba(225,152,50,0.25);
  z-index:-1;
  border-radius:4px;
}

.hero-excerpt{
  color:var(--muted);
  font-size:1.1rem;
  line-height:2;
  max-width:500px;
}

/* ===== HERO IMAGE ===== */
.hero-right{
  position:relative;
  overflow:hidden;
}

.hero-right img{
  width:100%;
  height:100%;
  object-fit:cover;
  transform:scale(1.05);
  transition:6s;
}

.hero-right:hover img{
  transform:scale(1);
}

.hero-right::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to right, var(--paper), transparent 40%);
}

/* floating cards */
.float{
  position:absolute;
  background:white;
  padding:14px 16px;
  border-radius:14px;
  box-shadow:0 10px 40px rgba(0,0,0,0.08);
  border:1px solid rgba(0,0,0,0.05);
}

.float strong{
  color:var(--blue);
  display:block;
  font-size:1.3rem;
}

/* ===== ARTICLE ===== */
.article{
  max-width:780px;
  margin:auto;
  padding:5rem 1.5rem;
}

.article p{
  font-size:1.1rem;
  line-height:2.3;
  margin-bottom:1.5rem;
}

.article h2{
  margin:2.5rem 0 1rem;
  position:relative;
  padding-right:14px;
}

.article h2::before{
  content:"";
  position:absolute;
  right:0;
  top:6px;
  width:4px;
  height:70%;
  background:var(--gold);
  border-radius:4px;
}

/* pull quote */
.quote{
  margin:3rem 0;
  padding:2rem;
  border-right:4px solid var(--gold);
  background:rgba(64,100,247,0.04);
  border-radius:12px;
  font-weight:700;
}

/* ===== RELATED ===== */
.related{
  background:#0f0f14;
  padding:4rem 2rem;
}

.related h2{
  color:white;
  margin-bottom:2rem;
}

.cards{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:1.5rem;
}

.card{
  background:rgba(255,255,255,0.06);
  border-radius:14px;
  overflow:hidden;
  color:white;
  text-decoration:none;
}

.card img{
  width:100%;
  height:160px;
  object-fit:cover;
}

.card div{
  padding:1rem;
}

.card span{
  color:var(--gold);
  font-size:0.8rem;
}

/* ===== FOOTER ===== */
footer{
  text-align:center;
  padding:2rem;
  color:#aaa;
  background:#080810;
}

/* mobile */
@media(max-width:900px){
  .hero{grid-template-columns:1fr;}
  .hero-title{font-size:2.2rem;}
}
</style>
</head>

<body>

<header>
  <div class="logo"><img src="logo.png"></div>
  <a class="back-btn" href="javascript:history.back()">رجوع</a>
</header>

<div id="progress"><div id="progress-fill"></div></div>

<section class="hero">

  <div class="hero-left">
    <div class="badge"><span class="badge-dot"></span> علم النفس · The Relax</div>

    <h1 class="hero-title" id="title">
      كيف تؤثر <em>الراحة النفسية</em> على حياتك؟
    </h1>

    <p class="hero-excerpt" id="desc">
      مقال يساعدك تفهم كيف الاستقرار النفسي يغير يومك بالكامل.
    </p>
  </div>

  <div class="hero-right">
    <img id="img" src="https://images.unsplash.com/photo-1511988617509-a57c8a288659">

    <div class="float" style="bottom:20px;left:20px;">
      <strong>87%</strong>
      تحسن نفسي
    </div>

    <div class="float" style="top:20px;left:20px;">
      <strong>3x</strong>
      إنتاجية أعلى
    </div>

  </div>

</section>

<section class="article" id="content"></section>

<section class="related">
  <h2>مقالات قد تعجبك</h2>

  <div class="cards">
    <a class="card">
      <img src="https://images.unsplash.com/photo-1493836512294-502baa1986e2">
      <div>
        <span>تطوير الذات</span>
        <p>كيف تبني عادات صحية</p>
      </div>
    </a>

    <a class="card">
      <img src="https://images.unsplash.com/photo-1506126613408-eca07ce68773">
      <div>
        <span>تأمل</span>
        <p>ابدأ التأمل اليوم</p>
      </div>
    </a>

    <a class="card">
      <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
      <div>
        <span>علاقات</span>
        <p>علاقات صحية ومتوازنة</p>
      </div>
    </a>
  </div>
</section>

<footer>
  © The Relax 2025
</footer>

<script>
window.addEventListener("scroll", () => {
  let h = document.documentElement.scrollHeight - window.innerHeight;
  let p = (window.scrollY / h) * 100;
  document.getElementById("progress-fill").style.width = p + "%";
});
</script>

</body>
</html>
