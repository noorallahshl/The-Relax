<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title id="pageTitle">The Relax</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">

  <style>
    /* =========================
       FONT SYSTEM
    ========================= */
    @font-face {
      font-family: "SST Arabic";
      src: url("SST-Arabic.woff2") format("woff2");
      font-weight: 100 900;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --blue:#4064f7;
      --gold:#e19832;
      --ink:#1a1a2e;
      --paper:#faf9f6;
      --muted:#7a7a8c;
      --line:rgba(64,100,247,0.12);
    }

    * {
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body {
      font-family: "SST Arabic", "Cairo", sans-serif;
      background: var(--paper);
      color: var(--ink);
      direction: rtl;
      text-align: right;
      overflow-x:hidden;
    }

    html {
      direction: rtl;
      scroll-behavior: smooth;
    }

    /* =========================
       HEADER
    ========================= */
    header {
      position: fixed;
      top: 0;
      width: 100%;
      height: 68px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 2rem;
      background: rgba(250,249,246,0.9);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--line);
      z-index: 100;
    }

    .logo img {
      width: 80px;
    }

    .back-btn {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.9rem;
    }

    /* =========================
       HERO
    ========================= */
    .hero {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 90vh;
      margin-top: 68px;
    }

    .hero-text {
      padding: 4rem 2rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .hero-title {
      font-size: 2.6rem;
      font-weight: 900;
      margin-bottom: 1rem;
    }

    .hero-excerpt {
      color: var(--muted);
      font-size: 1.1rem;
      line-height: 2;
    }

    .hero-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* =========================
       ARTICLE
    ========================= */
    .article {
      max-width: 760px;
      margin: auto;
      padding: 4rem 1.5rem;
    }

    .article p {
      font-size: 1.1rem;
      line-height: 2.2;
      margin-bottom: 1.5rem;
    }

    .article h2 {
      margin: 2rem 0 1rem;
      font-weight: 900;
      color: var(--ink);
    }

    /* =========================
       LOADING
    ========================= */
    .loading {
      opacity: 0.4;
    }

    .skeleton {
      background: linear-gradient(90deg,#eee,#f5f5f5,#eee);
      background-size: 400% 100%;
      animation: shimmer 1.2s infinite;
      border-radius: 8px;
    }

    @keyframes shimmer {
      0% {background-position:100% 0;}
      100% {background-position:0 0;}
    }

    .title-skeleton {
      height: 40px;
      width: 80%;
    }

    .text-skeleton {
      height: 16px;
      margin-top: 10px;
      width: 100%;
    }

  </style>
</head>

<body>

<header>
  <div class="logo">
    <a href="index.html">
      <img src="logo.png">
    </a>
  </div>

  <a class="back-btn" href="javascript:history.back()">رجوع</a>
</header>

<section class="hero">
  <div class="hero-text">

    <h1 class="hero-title loading" id="articleTitle">
      <div class="skeleton title-skeleton"></div>
    </h1>

    <p class="hero-excerpt loading" id="articleDescription">
      <div class="skeleton text-skeleton"></div>
      <div class="skeleton text-skeleton"></div>
    </p>

  </div>

  <div class="hero-img">
    <img id="articleImage" src="">
  </div>
</section>

<article class="article" id="articleContent"></article>

<script>
const STRAPI_URL = "https://the-relax-cms.onrender.com";

/* IMAGE */
function getImg(img){
  let url = img?.url || img?.data?.attributes?.url || img;
  if(!url) return "";
  return url.startsWith("http") ? url : STRAPI_URL + url;
}

/* LOAD */
async function loadArticle(){
  try {

    const slug = new URLSearchParams(window.location.search).get("slug");
    if(!slug) return;

    const res = await fetch(`${STRAPI_URL}/api/articles?filters[slug][$eq]=${slug}&populate=*`);
    const json = await res.json();

    const article = json?.data?.[0];
    if(!article) return;

    const data = article.attributes || article;

    document.getElementById("pageTitle").innerText = data.title + " - The Relax";

    document.getElementById("articleTitle").innerText = data.title || "";
    document.getElementById("articleDescription").innerText = data.short_description || "";
    document.getElementById("articleImage").src = getImg(data.cover_image);

    document.getElementById("articleContent").innerHTML =
      window.marked ? marked.parse(data.content || "") : data.content;

    document.querySelectorAll(".loading").forEach(e=>{
      e.style.opacity = 1;
    });

  } catch(e){
    console.log(e);
  }
}

document.addEventListener("DOMContentLoaded", loadArticle);
</script>

</body>
</html>
